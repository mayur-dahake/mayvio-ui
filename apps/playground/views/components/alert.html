<section class="component-card component-card-wide" aria-labelledby="alert-heading">
          <div class="component-header">
            <div>
              <h2 id="alert-heading">Alert</h2>
              <p class="component-description">Dismissible notifications with optional action buttons.</p>
            </div>
            <div class="controls">
              <button class="control-btn" data-view-docs="alert">View Docs</button>
              <button class="control-btn" data-view-code="alert">View Code</button>
            </div>
          </div>
          <div class="alert-stack">
            <div class="alert success" role="alert">
              <span class="alert-icon" aria-hidden="true">✓</span>
              <div class="alert-content">
                <div class="alert-title">Changes saved</div>
                <div class="alert-message">Your profile has been updated successfully.</div>
              </div>
              <button class="alert-close" aria-label="Dismiss alert">✕</button>
            </div>
            <div class="alert warning" role="alert">
              <span class="alert-icon" aria-hidden="true">⚠</span>
              <div class="alert-content">
                <div class="alert-title">Storage almost full</div>
                <div class="alert-message">You've used 90% of your available storage.</div>
                <div class="alert-actions">
                  <button class="alert-action">Upgrade plan</button>
                  <button class="alert-action" data-action="dismiss">Dismiss</button>
                </div>
              </div>
              <button class="alert-close" aria-label="Dismiss alert">✕</button>
            </div>
            <div class="alert info" role="alert">
              <span class="alert-icon" aria-hidden="true">ℹ</span>
              <div class="alert-content">
                <div class="alert-title">New version available</div>
                <div class="alert-message">Version 2.0 adds application-level components for real product layouts.</div>
              </div>
              <button class="alert-close" aria-label="Dismiss alert">✕</button>
            </div>
          </div>
        </section>
