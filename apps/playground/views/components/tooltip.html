<section class="component-card component-card-wide" aria-labelledby="tooltip-heading">
          <div class="component-header">
            <div>
              <h2 id="tooltip-heading">Tooltip</h2>
              <p class="component-description">Contextual hints on hover and focus — top, bottom, left, right.</p>
            </div>
            <div class="controls">
              <button class="control-btn" data-view-docs="tooltip">View Docs</button>
              <button class="control-btn" data-view-code="tooltip">View Code</button>
            </div>
          </div>

          <div class="tooltip-demo-grid">
            <div class="tooltip-wrapper" data-position="top">
              <button class="tooltip-trigger" aria-describedby="tip-top">Top</button>
              <span class="tooltip" id="tip-top" role="tooltip">Tooltip on top</span>
            </div>
            <div class="tooltip-wrapper" data-position="bottom">
              <button class="tooltip-trigger" aria-describedby="tip-bottom">Bottom</button>
              <span class="tooltip" id="tip-bottom" role="tooltip">Tooltip on bottom</span>
            </div>
            <div class="tooltip-wrapper" data-position="left">
              <button class="tooltip-trigger" aria-describedby="tip-left">Left</button>
              <span class="tooltip" id="tip-left" role="tooltip">Tooltip on left</span>
            </div>
            <div class="tooltip-wrapper" data-position="right">
              <button class="tooltip-trigger" aria-describedby="tip-right">Right</button>
              <span class="tooltip" id="tip-right" role="tooltip">Tooltip on right</span>
            </div>
          </div>
        </section>
