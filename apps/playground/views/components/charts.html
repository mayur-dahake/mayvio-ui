<section class="component-card component-card-wide" aria-labelledby="charts-heading">
          <div class="component-header">
            <div>
              <h2 id="charts-heading">Analytics Charts</h2>
              <p class="component-description">SVG Line, Bar, and Donut charts with responsive grids, dash offsets, and interactive hover tooltips.</p>
            </div>
            <div class="controls">
              <button class="control-btn active" data-chart-toggle="line">Line Chart</button>
              <button class="control-btn" data-chart-toggle="bar">Bar Chart</button>
              <button class="control-btn" data-chart-toggle="donut">Donut Chart</button>
              <button class="control-btn" data-view-docs="chart">View Docs</button>
              <button class="control-btn" data-view-code="chart">View Code</button>
            </div>
          </div>
          <div style="margin-top: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div id="demoChart" style="width: 100%; max-width: 600px;"></div>
          </div>
        </section>
