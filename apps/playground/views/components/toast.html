<section class="component-card" aria-labelledby="toast-heading">
            <div class="component-header">
              <div>
                <h2 id="toast-heading">Toast Notification</h2>
                <p class="component-description">Feedback messages with auto-dismiss and progress bar.</p>
              </div>
              <div class="controls">
                <button class="control-btn toast-btn success">Success</button>
                <button class="control-btn toast-btn error">Error</button>
                <button class="control-btn toast-btn warning">Warning</button>
                <button class="control-btn toast-btn info">Info</button>
                <button class="control-btn" data-view-docs="toast">View Docs</button>
                <button class="control-btn" data-view-code="toast">View Code</button>
              </div>
            </div>
          </section>
