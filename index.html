<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Component Lab</title>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="hero">

    <div class="badge">
      Frontend Playground
    </div>

    <h1>UI Component Lab</h1>

    <p class="subtitle">
      Modern, accessible and reusable UI components.
    </p>

    <button id="themeToggle">
      🌙 Dark Mode
    </button>

  </header>

  <main class="components">

    <section class="component-card">
      <h2>Skeleton Loader</h2>
      <p>Beautiful loading states.</p>
    </section>

    <section class="component-card">
      <h2>Toast Notification</h2>
      <p>Elegant feedback messages.</p>
    </section>

    <section class="component-card">
      <h2>Modal Dialog</h2>
      <p>Accessible modal windows.</p>
    </section>

    <section class="component-card">
      <h2>Tabs</h2>
      <p>Interactive content switching.</p>
    </section>

    <section class="component-card">
      <h2>Accordion</h2>
      <p>Expandable content sections.</p>
    </section>

  </main>

  <script src="script.js"></script>

</body>
</html>
